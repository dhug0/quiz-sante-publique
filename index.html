<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-tu fait·e pour la Santé Publique ?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0d9488; --teal-light: #14b8a6; --teal-pale: #ccfbf1;
    --navy: #0f2d40; --sand: #fef9f0; --text: #1e293b; --muted: #64748b; --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--sand); color:var(--text); min-height:100vh; }

  .screen { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* INTRO */
  #screen-intro { display:flex; flex-direction:column; align-items:center; min-height:100vh; background: linear-gradient(180deg, #e8f8f6 0%, var(--sand) 55%); }
  .hero-image-wrap { width:100%; max-height:54vh; overflow:hidden; position:relative; }
  .hero-image-wrap::after { content:''; position:absolute; bottom:0; left:0; right:0; height:140px; background:linear-gradient(to bottom,transparent,#e8f8f6 60%, var(--sand)); }
  .hero-image-wrap img { width:100%; object-fit:cover; object-position:top center; display:block; }
  .hero-content { padding:4px 32px 52px; text-align:center; max-width:480px; margin:0 auto; }
  .hero-eyebrow { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:400; color:var(--teal); letter-spacing:.02em; margin-bottom:14px; }
  .hero-title { font-family:'Syne',sans-serif; font-size:clamp(30px,8vw,44px); font-weight:800; line-height:1.08; color:var(--navy); margin-bottom:18px; }
  .hero-title span { color:var(--teal); display:block; }
  .hero-divider { width:48px; height:3px; background:var(--teal); border-radius:4px; margin:0 auto 20px; }
  .hero-sub { font-size:15px; font-weight:300; color:var(--muted); line-height:1.75; margin-bottom:36px; }
  .hero-sub strong { font-weight:500; color:var(--text); }
  .btn-start { background:linear-gradient(135deg, var(--teal), var(--navy)); color:var(--white); font-family:'Syne',sans-serif; font-weight:700; font-size:16px; padding:20px 52px; border:none; border-radius:100px; cursor:pointer; transition:transform .2s,box-shadow .2s; box-shadow:0 10px 28px rgba(13,148,136,.35); letter-spacing:.02em; }
  .btn-start:hover { transform:translateY(-3px); box-shadow:0 16px 36px rgba(13,148,136,.45); }
  .meta-pills { display:flex; justify-content:center; gap:16px; margin-top:18px; flex-wrap:wrap; }
  .meta-pill { font-size:12px; color:var(--muted); background:white; padding:5px 14px; border-radius:100px; box-shadow:0 1px 6px rgba(0,0,0,.07); }

  /* QUIZ */
  #screen-quiz { display:none; min-height:100vh; }
  .quiz-header { background:var(--navy); padding:24px 28px 28px; color:var(--white); }
  .quiz-label { font-family:'Syne',sans-serif; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; opacity:.6; margin-bottom:14px; }
  .progress-bar { height:4px; background:rgba(255,255,255,.15); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--teal-light); border-radius:4px; transition:width .4s ease; }
  .question-counter { font-family:'Syne',sans-serif; font-size:13px; font-weight:600; opacity:.5; margin-top:10px; }
  .question-area { padding:32px 24px 8px; max-width:560px; margin:0 auto; }
  .question-text { font-family:'Syne',sans-serif; font-size:clamp(18px,4.5vw,22px); font-weight:700; color:var(--navy); line-height:1.35; margin-bottom:28px; }
  .answers-grid { display:flex; flex-direction:column; gap:12px; }
  .answer-btn { background:var(--white); border:2px solid transparent; border-radius:20px; padding:18px 20px; text-align:left; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); transition:all .18s ease; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .answer-btn:hover { border-color:var(--teal); transform:translateX(4px); box-shadow:0 4px 20px rgba(13,148,136,.15); }
  .answer-btn.selected { border-color:var(--teal); background:var(--teal-pale); color:var(--navy); font-weight:500; }

  /* RESULT */
  #screen-result { display:none; flex-direction:column; align-items:center; min-height:100vh; }
  .result-header { width:100%; padding:60px 28px 40px; text-align:center; }
  .result-header.low { background:linear-gradient(135deg,#f1f5f9,#e2e8f0); }
  .result-header.mid { background:linear-gradient(135deg,#ecfdf5,#d1fae5); }
  .result-header.high { background:linear-gradient(135deg,#0d9488,#0f2d40); color:white; }
  .result-emoji { font-size:64px; display:block; margin-bottom:16px; animation:bounce .6s ease; }
  @keyframes bounce { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
  .result-score { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.6; margin-bottom:12px; }
  .result-title { font-family:'Syne',sans-serif; font-size:clamp(22px,6vw,30px); font-weight:800; line-height:1.2; margin-bottom:4px; }
  .result-body { padding:32px 28px; max-width:520px; margin:0 auto; width:100%; }
  .result-text { font-size:15px; line-height:1.7; color:var(--muted); margin-bottom:32px; font-weight:300; }
  .stand-invite { font-size:15px; font-weight:500; color:var(--teal); text-align:center; margin-bottom:20px; line-height:1.5; }
  .result-cta { background:var(--navy); color:var(--white); font-family:'Syne',sans-serif; font-weight:700; font-size:15px; padding:16px 36px; border:none; border-radius:100px; cursor:pointer; width:100%; margin-bottom:12px; transition:opacity .2s; }
  .result-cta:hover { opacity:.85; }
  .result-cta.secondary { background:transparent; color:var(--muted); border:2px solid #e2e8f0; font-size:14px; }
</style>
</head>

var current = 0;
var score = 0;
var answered = false;

function startQuiz() {
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  var q = questions[current];
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('question-counter').textContent = 'Question ' + (current + 1) + ' / ' + questions.length;
  document.getElementById('progress-fill').style.width = ((current / questions.length) * 100) + '%';

  var grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.answers.forEach(function(a) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = a.text;
    btn.onclick = function() { selectAnswer(btn, a.pts); };
    grid.appendChild(btn);
  });
}

function selectAnswer(btn, pts) {
  if (answered) return;
  answered = true;
  score += pts;
  document.querySelectorAll('.answer-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  setTimeout(function() {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 500);
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  var el = document.getElementById('screen-result');
  el.style.display = 'flex';

  var r = results[0];
  for (var i = 0; i < results.length; i++) {
    if (score >= results[i].min && score <= results[i].max) { r = results[i]; break; }

  document.getElementById('result-score').style.display = 'none';
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-text').textContent = r.text;

  var header = document.getElementById('result-header');
  header.className = 'result-header ' + r.theme;
  if (r.theme === 'high') {
    document.getElementById('result-score').style.color = 'rgba(255,255,255,0.7)';
    document.getElementById('result-title').style.color = 'white';
  }
}

function goToStand() {
  alert('On vous attend au stand Santé Publique ! 👋');
}

function restartQuiz() {
  current = 0;
  score = 0;
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-intro').style.display = 'flex';
}
</script>
</body>
</html>
